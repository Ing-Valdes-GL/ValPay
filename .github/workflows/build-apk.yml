name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: valpay_frontend
        run: flutter pub get

      - name: Build APK (release)
        working-directory: valpay_frontend
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          mkdir -p valpay_frontend/release
          cp valpay_frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk valpay_frontend/release/ValPay-arm64.apk
          cp valpay_frontend/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk valpay_frontend/release/ValPay-arm32.apk
          cp valpay_frontend/build/app/outputs/flutter-apk/app-x86_64-release.apk valpay_frontend/release/ValPay-x64.apk

      - name: Get version
        id: version
        run: echo "tag=v$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "ValPay ${{ steps.version.outputs.tag }}"
          body: |
            ## ValPay — Release Android

            ### Télécharger
            | Architecture | Fichier | Usage |
            |---|---|---|
            | **arm64-v8a** | ValPay-arm64.apk | Smartphones récents (recommandé) |
            | **armeabi-v7a** | ValPay-arm32.apk | Anciens appareils 32-bit |
            | **x86_64** | ValPay-x64.apk | Émulateurs |

            > **Note :** Activer "Sources inconnues" dans les paramètres Android avant l'installation.
          files: |
            valpay_frontend/release/ValPay-arm64.apk
            valpay_frontend/release/ValPay-arm32.apk
            valpay_frontend/release/ValPay-x64.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
