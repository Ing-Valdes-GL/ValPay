<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ValPay — Paiements Simplifiés au Cameroun">
  <meta name="theme-color" content="#1A3A6B">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ValPay">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>ValPay — Paiements Simplifiés</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0D2247 0%, #1A3A6B 50%, #2563EB 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-box {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .logo-box img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .app-name {
      font-size: 28px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      display: block;
    }

    .tagline {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      display: block;
      margin-top: 4px;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    /* Decorative circles */
    .circle {
      position: fixed;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .circle-1 { width: 300px; height: 300px; top: -80px; right: -80px; }
    .circle-2 { width: 120px; height: 120px; top: 100px; right: 40px; background: rgba(255,255,255,0.06); }
    .circle-3 { width: 200px; height: 200px; bottom: 80px; left: -60px; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>

  <div id="loading-screen">
    <div class="logo-box">
      <img src="assets/assets/images/logo.png" alt="ValPay" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'font-size:32px;font-weight:900;background:linear-gradient(135deg,#1A3A6B,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent\'>VP</span>'">
    </div>
    <div style="text-align:center;">
      <span class="app-name">ValPay</span>
      <span class="tagline">Paiements Simplifiés</span>
    </div>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <div class="loading-text">Chargement en cours…</div>
    </div>
  </div>

  <script>
    // Hide loading screen once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var screen = document.getElementById('loading-screen');
      if (screen) {
        screen.classList.add('hidden');
        setTimeout(function() { screen.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
